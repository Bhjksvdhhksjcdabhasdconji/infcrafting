<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Alchemist Pro</title>
    <style>
        :root { --bg: #0b0f1a; --sidebar: #161b29; --text: #e2e8f0; --accent: #60a5fa; }
        body { font-family: sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); color: var(--text); overflow: hidden; }
        
        #sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid #2d3748; display: flex; flex-direction: column; padding: 15px; }
        #canvas { flex-grow: 1; position: relative; background-image: radial-gradient(#2d3748 1px, transparent 1px); background-size: 40px 40px; }
        
        .search-bar { padding: 8px; margin-bottom: 15px; border-radius: 5px; border: 1px solid #4a5568; background: #1a202c; color: white; }
        
        .element { 
            padding: 8px 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 6px; cursor: grab; user-select: none; display: inline-block; transition: 0.2s;
        }
        .element:hover { border-color: var(--accent); background: rgba(96, 165, 250, 0.1); }
        
        .inventory-item { margin: 4px; display: inline-block; cursor: pointer; }
        .canvas-item { position: absolute; z-index: 10; white-space: nowrap; }
        
        #controls { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        button { padding: 8px 12px; cursor: pointer; border-radius: 5px; border: none; background: #334155; color: white; }
        button:hover { background: #475569; }
    </style>
</head>
<body>

<div id="sidebar">
    <h3 style="margin-top:0">Inventory</h3>
    <input type="text" class="search-bar" id="search" placeholder="Search elements..." oninput="filterItems()">
    <div id="inventory-list"></div>
</div>

<div id="canvas">
    <div id="controls">
        <button onclick="clearCanvas()">Clear Canvas</button>
        <button onclick="resetGame()" style="background: #991b1b;">Reset All</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const invList = document.getElementById('inventory-list');
    
    // Core recipes
    const recipes = {
        "Water 💧 + Fire 🔥": "Steam 💨",
        "Earth 🌍 + Water 💧": "Mud 💩",
        "Fire 🔥 + Earth 🌍": "Lava 🌋",
        "Wind 🌬️ + Earth 🌍": "Dust 🌪️",
        "Lava 🌋 + Water 💧": "Obsidian 💎",
        "Steam 💨 + Wind 🌬️": "Cloud ☁️",
        "Cloud ☁️ + Water 💧": "Rain 🌧️",
        "Rain 🌧️ + Earth 🌍": "Plant 🌱",
        "Plant 🌱 + Fire 🔥": "Coal ⬛",
        "Coal ⬛ + Fire 🔥": "Diamond 💎"
    };

    let unlocked = JSON.parse(localStorage.getItem('unlocked')) || ["Water 💧", "Fire 🔥", "Earth 🌍", "Wind 🌬️"];

    function save() { localStorage.setItem('unlocked', JSON.stringify(unlocked)); }

    function renderInventory(filter = "") {
        invList.innerHTML = '';
        unlocked.filter(i => i.toLowerCase().includes(filter.toLowerCase())).forEach(el => {
            const div = document.createElement('div');
            div.className = 'element inventory-item';
            div.innerText = el;
            div.onclick = () => spawn(el);
            invList.appendChild(div);
        });
    }

    function spawn(name) {
        const el = document.createElement('div');
        el.className = 'element canvas-item';
        el.innerText = name;
        el.style.left = (Math.random() * (canvas.clientWidth - 100) + 50) + "px";
        el.style.top = (Math.random() * (canvas.clientHeight - 100) + 50) + "px";
        makeDraggable(el);
        canvas.appendChild(el);
    }

    function makeDraggable(el) {
        let x = 0, y = 0, nx = 0, ny = 0;
        el.onmousedown = (e) => {
            nx = e.clientX; ny = e.clientY;
            document.onmouseup = () => {
                document.onmouseup = null; document.onmousemove = null;
                checkMerge(el);
            };
            document.onmousemove = (e) => {
                x = nx - e.clientX; y = ny - e.clientY;
                nx = e.clientX; ny = e.clientY;
                el.style.top = (el.offsetTop - y) + "px";
                el.style.left = (el.offsetLeft - x) + "px";
            };
        };
    }

    function checkMerge(dragged) {
        const items = document.querySelectorAll('.canvas-item');
        items.forEach(item => {
            if (item === dragged) return;
            const r1 = dragged.getBoundingClientRect();
            const r2 = item.getBoundingClientRect();
            if (!(r1.right < r2.left || r1.left > r2.right || r1.bottom < r2.top || r1.top > r2.bottom)) {
                combine(dragged.innerText, item.innerText, item.offsetLeft, item.offsetTop);
                dragged.remove(); item.remove();
            }
        });
    }

    function combine(a, b, x, y) {
        const res = recipes[`${a} + ${b}`] || recipes[`${b} + ${a}`];
        if (res) {
            if (!unlocked.includes(res)) { unlocked.push(res); save(); renderInventory(); }
            const el = document.createElement('div');
            el.className = 'element canvas-item';
            el.innerText = res;
            el.style.left = x + 'px'; el.style.top = y + 'px';
            makeDraggable(el);
            canvas.appendChild(el);
        }
    }

    function filterItems() { renderInventory(document.getElementById('search').value); }
    function clearCanvas() { document.querySelectorAll('.canvas-item').forEach(e => e.remove()); }
    function resetGame() { if(confirm("Reset everything?")) { localStorage.clear(); location.reload(); } }

    renderInventory();
</script>
</body>
</html>
