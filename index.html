<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinite Alchemist</title>
    <style>
        :root {
            --bg: #0f172a;
            --sidebar: #1e293b;
            --text: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            background-color: var(--bg);
            color: var(--text);
            overflow: hidden;
        }

        /* Sidebar - Inventory */
        #sidebar {
            width: 250px;
            background: var(--sidebar);
            border-right: 2px solid #334155;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
        }

        /* Main Crafting Area */
        #canvas {
            flex-grow: 1;
            position: relative;
            overflow: hidden;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }

        .element {
            padding: 10px 15px;
            background: #ffffff10;
            border: 1px solid #ffffff30;
            border-radius: 8px;
            cursor: grab;
            user-select: none;
            display: inline-block;
            transition: transform 0.1s;
            backdrop-filter: blur(5px);
        }

        .inventory-item {
            margin-bottom: 10px;
            text-align: center;
            display: block;
        }

        .canvas-item {
            position: absolute;
            z-index: 10;
        }

        .element:hover {
            border-color: var(--accent);
            background: #ffffff20;
        }

        h2 { font-size: 1.2rem; margin-top: 0; color: var(--accent); }
    </style>
</head>
<body>

<div id="sidebar">
    <h2>Inventory</h2>
    <div id="inventory-list">
        <!-- Initial Elements -->
    </div>
</div>

<div id="canvas">
    <!-- Crafting space -->
</div>

<script>
    const inventoryList = document.getElementById('inventory-list');
    const canvas = document.getElementById('canvas');

    // Initial game state
    let unlockedElements = ["Water 💧", "Fire 🔥", "Earth 🌍", "Wind 🌬️"];
    
    // Combination Recipes
    const recipes = {
        "Water 💧 + Fire 🔥": "Steam 💨",
        "Fire 🔥 + Water 💧": "Steam 💨",
        "Earth 🌍 + Water 💧": "Mud 💩",
        "Water 💧 + Earth 🌍": "Mud 💩",
        "Fire 🔥 + Earth 🌍": "Lava 🌋",
        "Earth 🌍 + Fire 🔥": "Lava 🌋",
        "Wind 🌬️ + Earth 🌍": "Dust 🌪️",
        "Steam 💨 + Air 🌬️": "Cloud ☁️",
        "Lava 🌋 + Water 💧": "Obsidian 💎"
    };

    function init() {
        renderInventory();
    }

    function renderInventory() {
        inventoryList.innerHTML = '';
        unlockedElements.forEach(el => {
            const div = document.createElement('div');
            div.className = 'element inventory-item';
            div.innerText = el;
            div.onclick = () => addToCanvas(el);
            inventoryList.appendChild(div);
        });
    }

    function addToCanvas(name) {
        const el = document.createElement('div');
        el.className = 'element canvas-item';
        el.innerText = name;
        el.style.left = '100px';
        el.style.top = '100px';
        
        makeDraggable(el);
        canvas.appendChild(el);
    }

    function makeDraggable(el) {
        let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
        el.onmousedown = dragMouseDown;

        function dragMouseDown(e) {
            e.preventDefault();
            pos3 = e.clientX;
            pos4 = e.clientY;
            document.onmouseup = closeDragElement;
            document.onmousemove = elementDrag;
        }

        function elementDrag(e) {
            e.preventDefault();
            pos1 = pos3 - e.clientX;
            pos2 = pos4 - e.clientY;
            pos3 = e.clientX;
            pos4 = e.clientY;
            el.style.top = (el.offsetTop - pos2) + "px";
            el.style.left = (el.offsetLeft - pos1) + "px";
        }

        function closeDragElement() {
            document.onmouseup = null;
            document.onmousemove = null;
            checkCollision(el);
        }
    }

    function checkCollision(draggedEl) {
        const items = document.querySelectorAll('.canvas-item');
        items.forEach(item => {
            if (item === draggedEl) return;

            const r1 = draggedEl.getBoundingClientRect();
            const r2 = item.getBoundingClientRect();

            const isOverlapping = !(r1.right < r2.left || 
                                    r1.left > r2.right || 
                                    r1.bottom < r2.top || 
                                    r1.top > r2.bottom);

            if (isOverlapping) {
                combine(draggedEl.innerText, item.innerText, item.offsetLeft, item.offsetTop);
                draggedEl.remove();
                item.remove();
            }
        });
    }

    function combine(a, b, x, y) {
        const key = `${a} + ${b}`;
        const result = recipes[key];

        if (result) {
            const newEl = document.createElement('div');
            newEl.className = 'element canvas-item';
            newEl.innerText = result;
            newEl.style.left = x + 'px';
            newEl.style.top = y + 'px';
            
            if (!unlockedElements.includes(result)) {
                unlockedElements.push(result);
                renderInventory();
            }

            makeDraggable(newEl);
            canvas.appendChild(newEl);
        }
    }

    init();
</script>

</body>
</html>
